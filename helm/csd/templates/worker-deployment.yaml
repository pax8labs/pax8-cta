{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "csd.fullname" . }}-worker
  labels:
    {{- include "csd.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "csd.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "csd.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "csd.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          env:
            - name: NODE_ENV
              value: production
            - name: REDIS_URL
              value: {{ include "csd.redisUrl" . | quote }}
            - name: WORKER_CONCURRENCY
              value: {{ .Values.worker.concurrency | quote }}
            - name: RATE_LIMIT_MAX
              value: {{ .Values.worker.rateLimitMax | quote }}
            - name: RATE_LIMIT_DURATION
              value: {{ .Values.worker.rateLimitDuration | quote }}
            - name: PARTNER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | default (printf "%s-secrets" (include "csd.fullname" .)) }}
                  key: partner-client-secret
            {{- if .Values.keyVault.enabled }}
            - name: AZURE_KEY_VAULT_URL
              value: {{ .Values.keyVault.vaultUrl | quote }}
            {{- end }}
            {{- if .Values.database.enabled }}
            - name: DATABASE_URL
              value: {{ include "csd.databaseUrl" . | quote }}
            {{- end }}
            - name: SNAPSHOT_DIR
              value: /app/snapshots
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- if .Values.worker.persistence.enabled }}
          volumeMounts:
            - name: snapshots
              mountPath: /app/snapshots
          {{- end }}
      {{- if .Values.worker.persistence.enabled }}
      volumes:
        - name: snapshots
          persistentVolumeClaim:
            claimName: {{ include "csd.fullname" . }}-worker-snapshots
      {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
