{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentsync.fullname" . }}-secrets
  labels:
    {{- include "agentsync.labels" . | nindent 4 }}
type: Opaque
stringData:
  redis-url: {{ include "agentsync.redisUrl" . | quote }}
  nextauth-secret: {{ .Values.secrets.nextauthSecret | quote }}
  azure-client-id: {{ .Values.secrets.azure.clientId | quote }}
  azure-client-secret: {{ .Values.secrets.azure.clientSecret | quote }}
  azure-tenant-id: {{ .Values.secrets.azure.tenantId | quote }}
  partner-client-secret: {{ .Values.secrets.partner.clientSecret | quote }}
{{- end }}
