{{- if not .Values.config.existingConfigMap }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentsync.fullname" . }}-config
  labels:
    {{- include "agentsync.labels" . | nindent 4 }}
data:
  tenants.yaml: |
    # AgentSync Tenant Configuration
    # This file should be customized with your actual tenant data

    partner:
      tenantId: "{{ .Values.config.tenants.partner.tenantId | default "your-partner-tenant-id" }}"
      clientId: "{{ .Values.config.tenants.partner.clientId | default "your-app-registration-client-id" }}"

    source:
      tenantId: "{{ .Values.config.tenants.source.tenantId | default "your-source-tenant-id" }}"
      environmentUrl: "{{ .Values.config.tenants.source.environmentUrl | default "https://your-org.crm.dynamics.com" }}"

    settings:
      concurrency: {{ .Values.config.tenants.settings.concurrency | default 5 }}
      retries: {{ .Values.config.tenants.settings.retries | default 3 }}
      healthCheck:
        enabled: true
        timeout: "30s"
      rollback:
        enabled: true
        autoRollbackOnFailure: false
        maxSnapshots: 5

    tenants:
      {{- if .Values.config.tenants.list }}
      {{- range .Values.config.tenants.list }}
      - name: {{ .name | quote }}
        tenantId: {{ .tenantId | quote }}
        environmentUrl: {{ .environmentUrl | quote }}
        enabled: {{ .enabled | default true }}
        {{- if .tags }}
        tags:
          {{- range .tags }}
          - {{ . | quote }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- else }}
      # Add your tenants here or provide them via values file
      # - name: "Example Tenant"
      #   tenantId: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
      #   environmentUrl: "https://example.crm.dynamics.com"
      #   enabled: true
      #   tags:
      #     - enterprise
      {{- end }}
{{- end }}
