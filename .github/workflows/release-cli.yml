name: Release CLI Binaries

on:
  push:
    tags:
      - 'cli-v*'
      - 'v*'

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            name: pax8-cta-macos-arm64
          - os: macos-latest
            target: bun-darwin-x64
            name: pax8-cta-macos-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            name: pax8-cta-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            name: pax8-cta-linux-arm64
          - os: windows-latest
            target: bun-windows-x64
            name: pax8-cta-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Core
        run: pnpm --filter @pax8/cta-core build

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/binaries
          bun build --compile --target=${{ matrix.target }} ./src/index.ts --outfile ${{ matrix.name }}
        working-directory: packages/cli

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Path dist/binaries -Force | Out-Null
          bun build --compile --target=${{ matrix.target }} ./src/index.ts --outfile ${{ matrix.name }}
        shell: pwsh
        working-directory: packages/cli

      - name: Generate checksums (Unix)
        if: runner.os != 'Windows'
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256
          else
            sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256
          fi
        working-directory: packages/cli

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        run: |
          $hash = (Get-FileHash -Path "${{ matrix.name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.name }}" | Out-File -FilePath "${{ matrix.name }}.sha256" -Encoding ascii
        shell: pwsh
        working-directory: packages/cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            packages/cli/${{ matrix.name }}
            packages/cli/${{ matrix.name }}.sha256
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name 'pax8-cta-*' -exec cp {} release/ \;
          ls -lh release/

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#cli-}
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        run: |
          cat > release_notes.md << 'EOF'
          # Pax8 CTA CLI ${{ steps.version.outputs.version }}

          Standalone binary releases for the Pax8 CTA CLI.

          ## Installation

          ### macOS
          ```bash
          # Apple Silicon (M1/M2/M3)
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/pax8-cta-macos-arm64 -o pax8-cta
          chmod +x pax8-cta
          sudo mv pax8-cta /usr/local/bin/

          # Intel
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/pax8-cta-macos-x64 -o pax8-cta
          chmod +x pax8-cta
          sudo mv pax8-cta /usr/local/bin/
          ```

          ### Linux
          ```bash
          # x64
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/pax8-cta-linux-x64 -o pax8-cta
          chmod +x pax8-cta
          sudo mv pax8-cta /usr/local/bin/

          # ARM64
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/pax8-cta-linux-arm64 -o pax8-cta
          chmod +x pax8-cta
          sudo mv pax8-cta /usr/local/bin/
          ```

          ### Windows
          ```powershell
          # One-line install (PowerShell)
          irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex

          # Or download manually
          ```
          Download [pax8-cta-windows-x64.exe](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/pax8-cta-windows-x64.exe) and add to your PATH.

          ## Verify Installation
          ```bash
          pax8-cta --version
          pax8-cta --help
          ```

          ## Usage
          ```bash
          # Deploy agents to all tenants
          pax8-cta deploy --all --solution ./myagent.zip

          # Deploy to specific tenants by tag
          pax8-cta deploy --tag production --solution ./myagent.zip

          # View deployment status
          pax8-cta deployments show <deployment-id>

          # List tenants
          pax8-cta tenants list

          # Get help
          pax8-cta --help
          pax8-cta deploy --help
          ```

          ## Checksums
          SHA256 checksums are provided for each binary. Verify with:
          ```bash
          sha256sum -c pax8-cta-*.sha256
          ```
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pax8 CTA CLI ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: |
            release/pax8-cta-*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
