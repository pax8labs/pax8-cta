name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      # npm 11+ has the cleanest OIDC trusted-publisher support. setup-node
      # with Node 22 ships npm 10.9; upgrade explicitly so npm publish
      # --provenance can use the GHA OIDC token to auth.
      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Core
        run: pnpm --filter @pax8-cta/core build

      - name: Build CLI
        run: pnpm --filter pax8-cta build

      # Pack with pnpm so `workspace:*` gets rewritten to a concrete version,
      # then publish the resulting tarball with `npm publish` so we get npm's
      # native OIDC trusted-publisher auth. `pnpm publish` doesn't reliably
      # engage OIDC; `npm publish --provenance` does. pnpm pack doesn't
      # support --filter, so we cd into each package dir.
      - name: Pack Core
        working-directory: packages/core
        run: pnpm pack --pack-destination /tmp/pkg-core

      - name: Publish Core
        run: npm publish /tmp/pkg-core/pax8-cta-core-*.tgz --access public --provenance

      - name: Pack CLI
        working-directory: packages/cli
        run: pnpm pack --pack-destination /tmp/pkg-cli

      - name: Publish CLI
        run: npm publish /tmp/pkg-cli/pax8-cta-*.tgz --access public --provenance
