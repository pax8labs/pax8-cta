name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Core
        run: pnpm --filter @pax8-cta/core build

      - name: Build CLI
        run: pnpm --filter pax8-cta build

      # Auth via npm trusted publishers (OIDC). Requires id-token: write
      # permission (above) and a trusted publisher configured on npmjs.com
      # for each package pointing at this workflow file. --provenance both
      # opts into the provenance attestation and tells npm to obtain the
      # OIDC token used for auth.
      - name: Publish Core
        run: pnpm --filter @pax8-cta/core publish --no-git-checks --access public --provenance

      - name: Publish CLI
        run: pnpm --filter pax8-cta publish --no-git-checks --access public --provenance
