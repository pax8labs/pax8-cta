name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: |
          pnpm --filter @pax8/cta-core lint
          pnpm --filter @pax8/cta lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: |
          pnpm --filter @pax8/cta-core build
          pnpm --filter @pax8/cta build

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          pnpm --filter @pax8/cta-core build
          pnpm --filter @pax8/cta build
          pnpm --filter @pax8/cta-core test
          pnpm --filter @pax8/cta test

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./packages/core/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @pax8/cta-core build
          pnpm --filter @pax8/cta build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/core/dist
            packages/cli/dist
          retention-days: 7

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @pax8/cta-core build
          pnpm --filter @pax8/cta build

      - name: Run CLI tests
        run: pnpm --filter @pax8/cta test
        env:
          DEMO_MODE: 'true'

      - name: Run core tests
        run: pnpm --filter @pax8/cta-core test -- --run --testPathIgnorePatterns=gdap-e2e
        continue-on-error: true

  test-windows-binary:
    name: Windows Binary Smoke Test
    runs-on: windows-latest
    needs: [test-windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Core
        run: pnpm --filter @pax8/cta-core build

      - name: Build Windows binary
        run: |
          New-Item -ItemType Directory -Path dist/binaries -Force | Out-Null
          bun build --compile --target=bun-windows-x64 ./src/index.ts --outfile dist/binaries/pax8-cta-windows-x64.exe
        shell: pwsh
        working-directory: packages/cli

      - name: Smoke test binary
        run: |
          $exe = "packages/cli/dist/binaries/pax8-cta-windows-x64.exe"
          Write-Host "Testing --version..."
          & $exe --version
          Write-Host "Testing --help..."
          & $exe --help
          Write-Host "Testing tenants list (demo mode)..."
          $env:DEMO_MODE = "true"
          & $exe tenants list
        shell: pwsh

      - name: Test install.ps1 syntax
        run: |
          $errors = $null
          [System.Management.Automation.PSParser]::Tokenize((Get-Content install.ps1 -Raw), [ref]$errors)
          if ($errors.Count -gt 0) {
            Write-Host "PowerShell syntax errors found:" -ForegroundColor Red
            $errors | ForEach-Object { Write-Host "  Line $($_.Token.StartLine): $($_.Message)" }
            exit 1
          }
          Write-Host "install.ps1 syntax is valid" -ForegroundColor Green
        shell: pwsh
