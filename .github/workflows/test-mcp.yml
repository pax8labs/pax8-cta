name: MCP Server Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/mcp-server/**'
      - '.github/workflows/test-mcp.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/mcp-server/**'
      - '.github/workflows/test-mcp.yml'
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  test:
    name: Run MCP Server Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @agentsync/mcp-server test

      - name: Build
        run: pnpm --filter @agentsync/mcp-server build
