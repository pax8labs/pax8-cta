# Preflight (preconditions) manifest for the Customer Service Agent.
#
# Sibling YAML next to the solution `.zip`. Loaded by `analyze` as the
# fifth dimension — surfaces tenant-config requirements with structured
# remediation (deep link, CLI command, or manual steps).
#
# Phase 1: matched against synthetic per-tenant state on `DEMO_TENANTS`.
# Phase 2: matched against Microsoft Graph TCM responses (real state).
#
# Placeholders supported in `urlTemplate`, `cmd`, and any string in
# `manualSteps`/`steps`: {tenantId} {tenantName} {resourceId}
# {resourceDisplayName}.
solution: CustomerServiceAgent
version: 1.0.0.5
preconditions:
  - id: ca-policy-mfa-admins-enabled
    description: Conditional Access policy must be enforced (not in reportOnly).
    resourceType: microsoft.entra.conditionalaccesspolicy
    matcher:
      displayName: Require MFA for Admins
    requirements:
      - property: state
        op: equals
        value: enabled
      - property: requireMfa
        op: at-least
        value: true
    severity: error
    remediation:
      kind: link
      title: "Set state from `reportOnly` to `enabled`"
      urlTemplate: "https://entra.microsoft.com/{tenantId}/conditionalaccess/policies/{resourceId}"
      manualSteps:
        - "Open the policy in Entra > Conditional Access."
        - "Change `Enable policy` from `Report-only` to `On`."
        - "Save and wait ~5 minutes for propagation."

  - id: dataverse-connection-not-expired
    description: Dataverse connection reference must be valid for solution import.
    resourceType: microsoft.powerplatform.connectionreference
    matcher:
      displayName: Dataverse
    requirements:
      - property: expired
        op: equals
        value: false
    severity: error
    remediation:
      kind: command
      title: "Refresh the Dataverse connection reference"
      cmd: "agentsync auth refresh --tenant {tenantName}"
      description: "Re-runs OAuth for the Dataverse connection in {tenantName}."

  - id: transport-rule-block-autoforward
    description: Block-External-AutoForward transport rule must be enabled.
    resourceType: microsoft.exchange.transportrule
    matcher:
      displayName: Block-External-AutoForward
    requirements:
      - property: enabled
        op: equals
        value: true
    severity: warning
    remediation:
      kind: manual
      title: "Enable the transport rule"
      steps:
        - "Open Exchange Admin Center for {tenantName}."
        - "Navigate to Mail flow > Rules."
        - "Locate `Block-External-AutoForward` and toggle it to `Enabled`."
